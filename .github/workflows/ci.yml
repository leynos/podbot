name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: github.actor != 'dependabot[bot]'
        run: cargo binstall --no-confirm cargo-audit
      - name: Setup Python for audit manifest extraction
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.x'
      - name: Audit dependencies
        if: github.actor != 'dependabot[bot]'
        run: make audit
      - name: Lint
        run: make lint
      - name: No-CLI compile check
        run: cargo check --no-default-features
      - name: No-CLI boundary tests
        run: cargo test --no-default-features --test cli_feature_gating --test compile_contract
      - name: Internal compatibility tests
        run: cargo test --features internal
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          features: internal
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
