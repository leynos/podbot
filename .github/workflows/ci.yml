name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.7'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@dfddcb6cf53a2583e55bf0c3536c01ed1f67dc16
      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Format
        run: make check-fmt
      - name: Enforce en-GB-oxendict spelling
        run: make spelling
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
            !**/.uv-cache/**
            !**/.uv-tools/**
      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: github.actor != 'dependabot[bot]'
        run: cargo binstall --no-confirm cargo-audit
      - name: Setup Python for audit manifest extraction
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.x'
      - name: Audit dependencies
        if: github.actor != 'dependabot[bot]'
        run: make audit
      - name: Cache Whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: No-CLI compile check
        run: cargo check --no-default-features
      - name: No-CLI boundary tests
        run: cargo test --no-default-features --test cli_feature_gating --test compile_contract
      - name: Internal compatibility tests
        run: cargo test --features internal
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@1c1a46f0b4fde6dd78a9757fc475a5d06ee891c7
        with:
          features: internal
          output-path: lcov.info
          format: lcov
          use-cargo-nextest: 'false'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@1c1a46f0b4fde6dd78a9757fc475a5d06ee891c7
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/75835
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
      - name: Set up Rust for Merman
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: '1.95.0'
      - name: Install Mermaid validation tools
        run: |
          uv tool install nixie-cli==1.1.0
          cargo +1.95.0 install merman-cli --version '=0.7.0' --locked
      - name: Validate Mermaid diagrams
        run: make nixie
      # Coverage is uploaded to CodeScene from coverage-main.yml on push to
      # main instead of here: CodeScene's `cs-coverage upload` only accepts
      # analysed branches, and this job runs on pull_request only.
